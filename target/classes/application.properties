# Server Profile
server.port=8080
spring.application.name=Finance Dashboard

# ==============================================================
# DEFAULT: H2 In-Memory Database Configuration
# ==============================================================
spring.datasource.url=jdbc:h2:mem:financedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize schema and data automatically (hibernate will create tables based on entities)
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

